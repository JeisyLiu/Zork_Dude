<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌫 迷雾之塔 - 文字冒险</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a12;color:#c8d6e5;font-family:'Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh}
#app{max-width:1100px;width:100%;margin:0 auto;padding:10px 15px;display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
#play-row{display:flex;gap:10px;align-items:stretch;flex:1;min-height:0;margin-bottom:10px}
#main-col{flex:1;min-width:0;display:flex;flex-direction:column}
#status{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:8px;padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center;font-size:13px;margin-bottom:10px;flex-shrink:0;box-shadow:0 0 20px rgba(84,160,255,.06)}
.st{display:flex;align-items:center;gap:4px}
.sl{color:#7f8fa6}.sv{color:#fff;font-weight:bold}
.hpbar{display:inline-block;width:80px;height:10px;background:#2d2d3a;border-radius:5px;overflow:hidden;vertical-align:middle}
.hpfill{height:100%;background:linear-gradient(90deg,#e74c3c,#2ecc71);border-radius:5px;transition:width .3s}
#story{flex:1;overflow-y:auto;background:#0f0f1a;border:1px solid #1e1e32;border-radius:8px;padding:14px 16px;margin-bottom:10px;min-height:220px;max-height:48vh;line-height:1.7;font-size:14px;white-space:pre-wrap;word-break:break-word}
#story .cmd{color:#54a0ff;margin-top:8px}
#story .sep{border-top:1px dashed #1e1e32;margin:6px 0}
#targets{display:none;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#12121e;border:1px solid #2a2a4a;border-radius:8px;margin-bottom:10px;flex-shrink:0}
#targets .tl{width:100%;color:#7f8fa6;font-size:12px}
#targets button{background:#1e1e32;color:#c8d6e5;border:1px solid #3a3a5a;border-radius:4px;padding:5px 12px;font-size:12px;cursor:pointer}
#targets button:hover{background:#2e2e4e;border-color:#54a0ff}
#targets .bc{background:#2a1a1a;border-color:#5a2a2a;color:#e74c3c}
#cmds{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;background:#12121e;border:1px solid #1e1e32;border-radius:8px;flex-shrink:0;margin-bottom:8px}
.cg{display:flex;flex-direction:column;gap:2px;margin-right:8px}
.cgl{font-size:10px;color:#576574;letter-spacing:1px}
.cb{display:flex;flex-wrap:wrap;gap:3px}
#cmds button{background:#1a1a2e;color:#c8d6e5;border:1px solid #2a2a4a;border-radius:4px;padding:6px 11px;font-size:12px;cursor:pointer;font-family:inherit}
#cmds button:hover{background:#2e2e4e;border-color:#54a0ff}
#cmds button:active{transform:scale(.96)}
#targets button .hint,
#cmds button .hint{display:block;font-size:9px;color:#576574;font-weight:normal;margin-top:1px;letter-spacing:0}
.bm{min-width:42px;text-align:center;font-weight:bold}
.bi{border-color:#54a0ff;color:#54a0ff}
.br{border-color:#c0392b;color:#e74c3c}
.bg{border-color:#27ae60;color:#2ecc71}
.by{border-color:#d68910;color:#f1c40f}
#cmds button:disabled,#targets button:disabled{opacity:.4;cursor:not-allowed}
#story::-webkit-scrollbar{width:6px}
#story::-webkit-scrollbar-track{background:#0f0f1a}
#story::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
@media(max-width:600px){#status{font-size:11px;gap:4px 8px}#story{font-size:13px;padding:10px 12px;max-height:42vh}#cmds button{font-size:11px;padding:5px 7px}#input-box{font-size:13px;padding:6px 10px}}
#input-row{display:flex;gap:6px;padding:6px 10px;background:#12121e;border:1px solid #2a2a4a;border-radius:8px;flex-shrink:0;margin-bottom:10px;align-items:center}
#input-row span{color:#7f8fa6;font-size:13px;flex-shrink:0}
#input-box{flex:1;background:#0f0f1a;color:#c8d6e5;border:1px solid #2a2a4a;border-radius:4px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none}
#input-box:focus{border-color:#54a0ff}
#input-btn{background:#1e1e32;color:#54a0ff;border:1px solid #3a3a5a;border-radius:4px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
#input-btn:hover{background:#2e2e4e;border-color:#54a0ff}

/* ── 顶部英雄区 ── */
#hero{position:relative;overflow:hidden;background:linear-gradient(145deg,#0d0d1a 0%,#1a0a2e 30%,#0f1a2e 70%,#0a0a12 100%);border:1px solid #2a2a4a;border-radius:12px;padding:22px 20px 18px;margin-bottom:10px;flex-shrink:0;text-align:center}
#hero .hero-mist{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.15;background:radial-gradient(ellipse at 20% 50%,#4a6fa5 0%,transparent 50%),radial-gradient(ellipse at 80% 30%,#6a4fa5 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,#2a6f6a 0%,transparent 50%);animation:mistDrift 8s ease-in-out infinite alternate}
#hero #mist2{opacity:.1;background:radial-gradient(ellipse at 30% 70%,#8a6fcf 0%,transparent 40%),radial-gradient(ellipse at 70% 60%,#4f8acf 0%,transparent 40%);animation:mistDrift2 12s ease-in-out infinite alternate}
@keyframes mistDrift{0%{transform:translateX(-5%) scale(1)}100%{transform:translateX(5%) scale(1.1)}}
@keyframes mistDrift2{0%{transform:translateX(5%) scale(1.1)}100%{transform:translateX(-5%) scale(0.95)}}
#hero .hero-title{position:relative;z-index:1}
#hero .tower-icon{font-size:42px;display:block;margin-bottom:6px;animation:towerFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(84,160,255,.4))}
@keyframes towerFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#hero h1{font-size:42px;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#c8d6e5 0%,#54a0ff 40%,#a855f7 60%,#54a0ff 80%,#c8d6e5 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleShine 4s ease-in-out infinite;margin-bottom:4px;text-shadow:none;filter:drop-shadow(0 0 30px rgba(84,160,255,.15))}
@keyframes titleShine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
#hero .subtitle{font-size:13px;color:#576574;letter-spacing:4px;margin-bottom:8px}
#hero .title-line{width:80px;height:2px;margin:0 auto 8px;background:linear-gradient(90deg,transparent,#54a0ff,#a855f7,transparent);border-radius:2px;animation:linePulse 3s ease-in-out infinite}
@keyframes linePulse{0%,100%{opacity:.4;transform:scaleX(.8)}50%{opacity:1;transform:scaleX(1)}}
#hero .tagline{font-size:14px;color:#7f8fa6;letter-spacing:2px;opacity:.8}

/* ── 浮动粒子 ── */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0}
.p{position:absolute;width:4px;height:4px;background:#54a0ff;border-radius:50%;opacity:0;animation:particleFloat linear infinite}
@keyframes particleFloat{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
#particles .p:nth-child(1){left:12%;width:3px;height:3px;animation-duration:18s;animation-delay:0s;background:#54a0ff}
#particles .p:nth-child(2){left:25%;width:5px;height:5px;animation-duration:22s;animation-delay:2s;background:#a855f7}
#particles .p:nth-child(3){left:38%;width:2px;height:2px;animation-duration:15s;animation-delay:4s;background:#2ecc71}
#particles .p:nth-child(4){left:50%;width:4px;height:4px;animation-duration:20s;animation-delay:1s;background:#f1c40f}
#particles .p:nth-child(5){left:62%;width:3px;height:3px;animation-duration:17s;animation-delay:5s;background:#54a0ff}
#particles .p:nth-child(6){left:75%;width:5px;height:5px;animation-duration:25s;animation-delay:3s;background:#a855f7}
#particles .p:nth-child(7){left:88%;width:2px;height:2px;animation-duration:14s;animation-delay:6s;background:#2ecc71}
#particles .p:nth-child(8){left:5%;width:4px;height:4px;animation-duration:21s;animation-delay:7s;background:#f1c40f}
#particles .p:nth-child(9){left:45%;width:3px;height:3px;animation-duration:19s;animation-delay:2.5s;background:#54a0ff}
#particles .p:nth-child(10){left:95%;width:4px;height:4px;animation-duration:23s;animation-delay:1.5s;background:#a855f7}

@media(max-width:600px){#hero{padding:18px 14px 14px}#hero h1{font-size:28px;letter-spacing:4px}#hero .tower-icon{font-size:30px}#hero .subtitle{font-size:11px;letter-spacing:2px}#hero .tagline{font-size:12px}}

/* ── 迷雾地图（常驻侧栏） ── */
#map-panel{width:320px;flex-shrink:0;max-height:calc(48vh + 120px);background:linear-gradient(160deg,#12121e,#0f0f1a);border:1px solid #2a2a4a;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;align-self:stretch}
#map-panel.hidden{display:none}
#map-btn{position:relative;margin-left:auto;background:#1e1e32;color:#54a0ff;border:1px solid #3a3a5a;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
#map-btn:hover{background:#2e2e4e;border-color:#54a0ff}
#map-btn.off{color:#7f8fa6;border-color:#2a2a4a}
#map-btn.map-pulse{animation:mapPulse 1s ease-out;border-color:#54a0ff;box-shadow:0 0 12px rgba(84,160,255,.5)}
#map-btn .map-badge{position:absolute;top:-6px;right:-6px;background:#54a0ff;color:#0a0a12;font-size:9px;font-weight:bold;padding:1px 4px;border-radius:8px;line-height:1.2}
#map-panel.map-pulse{animation:mapPulse 1s ease-out;border-color:#54a0ff;box-shadow:0 0 16px rgba(84,160,255,.35)}
@keyframes mapPulse{0%{box-shadow:0 0 0 0 rgba(84,160,255,.55)}100%{box-shadow:0 0 0 12px rgba(84,160,255,0)}}
#map-hide{background:transparent;border:1px solid #3a3a5a;color:#7f8fa6;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit}
#map-hide:hover{border-color:#54a0ff;color:#c8d6e5}
#map-header{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #1e1e32;flex-shrink:0}
#map-header h2{font-size:13px;color:#c8d6e5;letter-spacing:1px;flex:1}
#map-count{font-size:11px;color:#7f8fa6}
#map-toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;border-bottom:1px solid #1e1e32;flex-shrink:0;flex-wrap:wrap}
.map-tab,.map-mode{background:#1a1a2e;color:#7f8fa6;border:1px solid #2a2a4a;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.map-tab:hover,.map-mode:hover{border-color:#54a0ff;color:#c8d6e5}
.map-tab.active,.map-mode.active{background:#1e2a4a;border-color:#54a0ff;color:#54a0ff}
#map-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
#map-canvas-wrap{flex:1;overflow:auto;position:relative;min-height:160px;display:none}
#map-canvas-wrap.active{display:block}
#map-svg{display:block;min-width:100%;min-height:160px;touch-action:none;cursor:grab}
#map-svg.dragging{cursor:grabbing}
#map-list{display:none;flex:1;overflow-y:auto;padding:6px 8px;min-height:100px}
#map-list.active{display:block}
.map-list-item{padding:6px 8px;border:1px solid #1e1e32;border-radius:6px;margin-bottom:4px;font-size:12px;cursor:pointer;background:#12121e}
.map-list-item:hover{border-color:#54a0ff}
.map-list-item.here{border-color:#54a0ff;background:#1a2540}
.map-list-item .ml-short{margin-right:6px}
.map-list-item .ml-name{color:#c8d6e5}
#map-detail{padding:6px 10px;border-top:1px solid #1e1e32;font-size:11px;color:#7f8fa6;min-height:32px;flex-shrink:0;line-height:1.4}
#map-detail strong{color:#c8d6e5}
#map-legend{display:flex;gap:10px;padding:4px 10px 8px;font-size:10px;color:#576574;flex-shrink:0}
.map-legend-item{display:flex;align-items:center;gap:3px}
.map-node{cursor:pointer}
.map-node.combat-disabled{cursor:default;pointer-events:none}
@media(max-width:820px){
  #play-row{flex-direction:column}
  #map-panel{width:100%;max-height:260px;order:-1}
  #story{max-height:36vh;min-height:160px}
}
@media(max-width:600px){#map-panel{max-height:220px}#map-svg{min-height:120px}}
</style>
</head>

function buildMapMetaFromRooms(rooms){
  const meta={};
  for(const r of rooms){
    const emoji=r.emoji||"📍";
    if(r.map&&r.map.layers){
      const layers={};
      for(const[layer,pos]of Object.entries(r.map.layers))layers[layer]={x:pos.x,y:pos.y,short:pos.emoji||emoji};
      meta[r.id]={layers};
    }else if(r.map){
      meta[r.id]={layer:r.map.layer,x:r.map.x,y:r.map.y,short:emoji};
    }
  }
  return meta;
}

function mapPos(roomId,layer){const m=MAP_META[roomId];if(!m)return null;if(m.layers)return m.layers[layer]||null;if(m.layer===layer)return{x:m.x,y:m.y,short:m.short};return null}
function mapLayerOfRoom(roomId){const m=MAP_META[roomId];if(!m)return"surface";if(roomId==="tower_base")return"surface";if(m.layer==="tower")return"tower";if(m.layers)return"surface";return m.layer}

function roomExitDetail(roomId){const rm=game.rooms[roomId];if(!rm)return[];const out=[];for(const[dir,tid]of Object.entries(rm.exits||{})){const tr=game.rooms[tid];if(!tr||!tr.visited)continue;out.push({dir,tid,short:roomShortName(tid)})}return out}

function upd(){document.getElementById("hpt").textContent=`${game.player_hp}/${game.player_max_hp}`;document.getElementById("hpf").style.width=`${(game.player_hp/game.player_max_hp)*100}%`;document.getElementById("gdt").textContent=game.gold;document.getElementById("sct").textContent=game.score;document.getElementById("wgt").textContent=`${game._totalWeight()}/12`;const cn=game.companion_list.map(c=>{const c2=game.companions[c];return c2?c2.name:""}).filter(Boolean);document.getElementById("cpt").textContent=cn.length?cn.join(", "):"无";if(mapVisible){syncMapLayerToPlayer();refreshMap()}}
function notifyNewVisit(){flashMapHint();if(mapVisible){syncMapLayerToPlayer();refreshMap()}}
function flashMapHint(){const el=mapVisible?mapPanel:mapBtn;el.classList.add("map-pulse");if(!mapVisible){let badge=mapBtn.querySelector(".map-badge");if(!badge){badge=document.createElement("span");badge.className="map-badge";badge.textContent="+1";mapBtn.appendChild(badge)}else badge.textContent="+1"}setTimeout(()=>{el.classList.remove("map-pulse");const b=mapBtn.querySelector(".map-badge");if(b)b.remove()},1000)}
function applyMapVisibility(){mapPanel.classList.toggle("hidden",!mapVisible);mapBtn.classList.toggle("off",!mapVisible);mapBtn.textContent=mapVisible?"🗺️ 地图":"🗺️ 地图·关";try{localStorage.setItem("mist_map_visible",mapVisible?"1":"0")}catch(e){}if(mapVisible){syncMapLayerToPlayer();refreshMap()}}
function setMapVisible(v){mapVisible=!!v;applyMapVisibility()}
function toggleMap(){setMapVisible(!mapVisible);return mapVisible?"已显示迷雾残页。":"已隐藏迷雾残页。"}
function syncMapLayerToPlayer(){if(!game)return;const curLayer=mapLayerOfRoom(game.current_room_id);if(curLayer&&curLayer!==mapLayer){mapLayer=curLayer;document.querySelectorAll(".map-tab").forEach(t=>t.classList.toggle("active",t.dataset.layer===mapLayer))}}
function focusMap(){setMapVisible(true);mapPanel.scrollIntoView({behavior:"smooth",block:"nearest"});return"已显示迷雾残页。"}
function setMapLayer(layer){mapLayer=layer;document.querySelectorAll(".map-tab").forEach(t=>t.classList.toggle("active",t.dataset.layer===layer));if(mapVisible)refreshMap()}
function setMapMode(mode){mapMode=mode;document.querySelectorAll(".map-mode").forEach(m=>m.classList.toggle("active",m.dataset.mode===mode));document.getElementById("map-canvas-wrap").classList.toggle("active",mode==="graph");mapListEl.classList.toggle("active",mode==="list");if(mapVisible)refreshMap()}
function visitedOnLayer(layer){return Object.keys(game.rooms).filter(id=>game.rooms[id].visited&&mapPos(id,layer))}
function mapNodeDetail(roomId){const rm=game.rooms[roomId];const pos=mapPos(roomId,mapLayer)||{short:roomShortName(roomId)};if(!rm)return"";const exits=roomExitDetail(roomId);const exitTxt=exits.length?exits.map(e=>`${MAP_DIR_LABEL[e.dir]||e.dir}→${e.short}`).join(" · "):"（尚无已探索出口）";let dark=rm.dark&&!game.hasLight()?" · 🌑需光源":"";return`<strong>${rm.name}</strong> ${pos.short}　出口：${exitTxt}${dark}`}
function onMapNodeClick(roomId){if(game.in_combat)return;mapDetail.innerHTML=mapNodeDetail(roomId)}
function mapEdgesForLayer(layer){const edges=[];const seen=new Set();for(const id of visitedOnLayer(layer)){const rm=game.rooms[id];for(const[dir,tid]of Object.entries(rm.exits||{})){if(!game.rooms[tid]?.visited)continue;if(!mapPos(tid,layer))continue;const key=[id,tid].sort().join("|");if(seen.has(key))continue;seen.add(key);edges.push({from:id,to:tid})}}return edges}
function renderMapGraph(){const layer=mapLayer;const ids=visitedOnLayer(layer);mapSvg.innerHTML="";if(!ids.length){mapSvg.setAttribute("viewBox","0 0 200 80");mapSvg.innerHTML='<text x="100" y="44" text-anchor="middle" fill="#576574" font-size="13">此层尚无探索记录</text>';mapCountEl.textContent=`已探索 ${countVisited()}`;return}let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;const pts={};for(const id of ids){const p=mapPos(id,layer);const cx=MAP_PAD+p.x*MAP_CELL;const cy=MAP_PAD+p.y*MAP_CELL;pts[id]={cx,cy,short:p.short};minX=Math.min(minX,cx);minY=Math.min(minY,cy);maxX=Math.max(maxX,cx);maxY=Math.max(maxY,cy)}const edges=mapEdgesForLayer(layer);const gEdges=document.createElementNS("http://www.w3.org/2000/svg","g");gEdges.setAttribute("stroke","#2a3a5a");gEdges.setAttribute("stroke-width","2");for(const e of edges){const a=pts[e.from],b=pts[e.to];if(!a||!b)continue;const line=document.createElementNS("http://www.w3.org/2000/svg","line");line.setAttribute("x1",a.cx);line.setAttribute("y1",a.cy);line.setAttribute("x2",b.cx);line.setAttribute("y2",b.cy);gEdges.appendChild(line)}mapSvg.appendChild(gEdges);const gNodes=document.createElementNS("http://www.w3.org/2000/svg","g");const here=game.current_room_id;const combat=game.in_combat;for(const id of ids){const p=pts[id];const isHere=id===here;const g=document.createElementNS("http://www.w3.org/2000/svg","g");g.setAttribute("class","map-node"+(combat?" combat-disabled":""));g.setAttribute("transform",`translate(${p.cx},${p.cy})`);if(!combat)g.addEventListener("click",()=>onMapNodeClick(id));const circle=document.createElementNS("http://www.w3.org/2000/svg","circle");circle.setAttribute("r",isHere?16:13);circle.setAttribute("fill",isHere?"#1a3050":"#1e2a4a");circle.setAttribute("stroke",isHere?"#54a0ff":"#3a4a6a");circle.setAttribute("stroke-width",isHere?2.5:1.2);if(isHere)circle.setAttribute("filter","drop-shadow(0 0 6px rgba(84,160,255,.7))");g.appendChild(circle);const label=document.createElementNS("http://www.w3.org/2000/svg","text");label.setAttribute("text-anchor","middle");label.setAttribute("dominant-baseline","central");label.setAttribute("font-size",isHere?"16":"14");label.textContent=isHere?MAP_PLAYER:p.short;g.appendChild(label);gNodes.appendChild(g)}mapSvg.appendChild(gNodes);const w=maxX-minX+MAP_PAD*2,h=maxY-minY+MAP_PAD*2;mapSvg.setAttribute("viewBox",`${minX-MAP_PAD} ${minY-MAP_PAD} ${Math.max(w,180)} ${Math.max(h,140)}`);mapCountEl.textContent=`已探索 ${countVisited()}`;if(here&&pts[here])mapDetail.innerHTML=mapNodeDetail(here)}
function renderMapList(){const layer=mapLayer;const ids=game.visitOrder.filter(id=>game.rooms[id]?.visited&&mapPos(id,layer));mapListEl.innerHTML="";if(!ids.length){mapListEl.innerHTML='<div style="color:#576574;font-size:12px;padding:8px 0">此层尚无探索记录</div>'}else{for(const id of ids){const rm=game.rooms[id];const pos=mapPos(id,layer);const div=document.createElement("div");div.className="map-list-item"+(id===game.current_room_id?" here":"");div.innerHTML=`<span class="ml-short">${id===game.current_room_id?MAP_PLAYER:pos.short}</span><span class="ml-name">${rm.name}</span>`;if(!game.in_combat)div.onclick=()=>onMapNodeClick(id);mapListEl.appendChild(div)}}mapCountEl.textContent=`已探索 ${countVisited()}`;if(game.current_room_id&&mapPos(game.current_room_id,layer))mapDetail.innerHTML=mapNodeDetail(game.current_room_id)}
function refreshMap(){if(!game||!mapVisible)return;if(mapMode==="list")renderMapList();else renderMapGraph()}
function initMapUi(){try{const saved=localStorage.getItem("mist_map_visible");if(saved!==null)mapVisible=saved!=="0"}catch(e){}applyMapVisibility();mapBtn.onclick=()=>toggleMap();document.getElementById("map-hide").onclick=()=>setMapVisible(false);document.querySelectorAll(".map-tab").forEach(t=>t.onclick=()=>setMapLayer(t.dataset.layer));document.querySelectorAll(".map-mode").forEach(m=>m.onclick=()=>setMapMode(m.dataset.mode));mapSvg.addEventListener("pointerdown",e=>{mapDrag={x:e.clientX,y:e.clientY,ox:mapSvg.viewBox.baseVal.x,oy:mapSvg.viewBox.baseVal.y};mapSvg.classList.add("dragging");mapSvg.setPointerCapture(e.pointerId)});mapSvg.addEventListener("pointermove",e=>{if(!mapDrag)return;const dx=(e.clientX-mapDrag.x)*0.6,dy=(e.clientY-mapDrag.y)*0.6;mapSvg.viewBox.baseVal.x=mapDrag.ox-dx;mapSvg.viewBox.baseVal.y=mapDrag.oy-dy});mapSvg.addEventListener("pointerup",()=>{mapDrag=null;mapSvg.classList.remove("dragging")});mapSvg.addEventListener("pointercancel",()=>{mapDrag=null;mapSvg.classList.remove("dragging")})}
function showTargets(label,buttons){target.style.display="flex";target.innerHTML=`<div class="tl">${label}</div>`;for(const{text,hint,cls,action}of buttons){const b=document.createElement("button");b.innerHTML=hint?`${text}<span class="hint">/${hint}</span>`:text;if(cls)b.className=cls;b.onclick=()=>{target.style.display="none";target.innerHTML="";action()};target.appendChild(b)}}
function clearTargets(){target.style.display="none";target.innerHTML="";pending=null}
function exec(fn,name){if(game.game_over){log(game.won?"🎉 你已经通关了！刷新页面重玩。":"💀 游戏已结束。刷新页面重玩。");return}if(pending)clearTargets();log(name,true);const r=fn();log(r);if(game.won){log("\n🎉 你找回了所有记忆，打破了迷雾诅咒！通关！");log(`得分：${game.score}`)}if(game.player_hp<=0){log("\n💀 你死了……");game.game_over=true}game.turns++;upd()}
function addGroup(lbl,buttons){const g=document.createElement("div");g.className="cg";g.innerHTML=`<div class="cgl">${lbl}</div><div class="cb"></div>`;const btns=g.querySelector(".cb");for(const{text,hint,cls,action}of buttons){const b=document.createElement("button");b.innerHTML=hint?`${text}<span class="hint">/${hint}</span>`:text;if(cls)b.className=cls;b.onclick=action;btns.appendChild(b)}cmds.appendChild(g)}
function buildCommands(){
  addGroup("移动",[{text:"北",hint:"north",cls:"bm",action:()=>exec(()=>game.doGo("north"),"north")},{text:"南",hint:"south",cls:"bm",action:()=>exec(()=>game.doGo("south"),"south")},{text:"东",hint:"east",cls:"bm",action:()=>exec(()=>game.doGo("east"),"east")},{text:"西",hint:"west",cls:"bm",action:()=>exec(()=>game.doGo("west"),"west")},{text:"上",hint:"up",cls:"bm",action:()=>exec(()=>game.doGo("up"),"up")},{text:"下",hint:"down",cls:"bm",action:()=>exec(()=>game.doGo("down"),"down")}]);
  addGroup("探索",[{text:"👁️ 查看",hint:"look / l",action:()=>exec(()=>game.doLook(),"look")},{text:"🎒 背包",hint:"inv / i",cls:"bi",action:()=>exec(()=>game.doInventory(),"inventory")},{text:"🗺️ 地图",hint:"map / m",cls:"bi",action:()=>exec(()=>toggleMap(),"map")},{text:"📖 帮助",hint:"help / h",action:()=>exec(()=>game.doHelp(),"help")},{text:"🏆 得分",hint:"score",action:()=>exec(()=>game.doScore(),"score")}]);
  addGroup("物品",[{text:"拿起",hint:"take 序号",action:()=>{const rm=game.rooms[game.current_room_id];if(!rm.items.length){exec(()=>"这里没有可拿的物品。","take");return}showTargets("选择物品：",[...rm.items.map((iid,idx)=>({text:`(${idx+1}) ${emojiLabel(game.items[iid])||iid}`,action:()=>exec(()=>game.doTake([String(idx+1)]),`take ${idx+1}`)})),{text:"拿全部",hint:"take all",cls:"bg",action:()=>exec(()=>game.doTake(["all"]),"take all")},{text:"取消",hint:"esc",cls:"bc",action:clearTargets}])}},{text:"丢弃",hint:"drop 序号",action:()=>{const ik=Object.keys(game.inventory);if(!ik.length){exec(()=>"背包是空的。","drop");return}showTargets("丢弃物品：",[...ik.map((iid,idx)=>{const it=game.items[iid];return{text:`(${idx+1}) ${it?emojiLabel(it):iid}${it&&it.stackable&&game.inventory[iid]>1?" x"+game.inventory[iid]:""}`,action:()=>exec(()=>game.doDrop([String(idx+1)]),`drop ${idx+1}`)}}),{text:"取消",hint:"esc",cls:"bc",action:clearTargets}])}},{text:"使用",hint:"use 序号",action:()=>{const ik=Object.keys(game.inventory);const u=ik.filter(i=>game.items[i]?.usable);if(!u.length){exec(()=>"没有可用物品。","use");return}showTargets("使用物品：",[...u.map(iid=>{const idx=ik.indexOf(iid)+1;const it=game.items[iid];return{text:`(${idx}) ${emojiLabel(it)}${it.stackable&&game.inventory[iid]>1?" x"+game.inventory[iid]:""}`,action:()=>exec(()=>game.doUse([String(idx)]),`use ${idx}`)}}),{text:"取消",hint:"esc",cls:"bc",action:clearTargets}])}}]);
  addGroup("社交",[{text:"💬 对话",hint:"talk",action:()=>exec(()=>game.doTalk(),"talk")},{text:"🛒 商品",hint:"trade",action:()=>exec(()=>game.doTrade(),"trade")},{text:"购买",hint:"buy 序号",action:()=>{const rm=game.rooms[game.current_room_id];if(!rm.npc_id||!game.npcs[rm.npc_id]){exec(()=>"没有商人。","buy");return}const npc=game.npcs[rm.npc_id];if(npc.npc_type!=="MERCHANT"||!npc.trade_items.length){exec(()=>"没有商品。","buy");return}showTargets("购买：",[...npc.trade_items.map(([iid,price],idx)=>({text:`(${idx+1}) ${game.items[iid]?.name||iid} ${price}💰`,action:()=>exec(()=>game.doBuy([String(idx+1)]),`buy ${idx+1}`)})),{text:"取消",hint:"esc",cls:"bc",action:clearTargets}])}},{text:"出售",hint:"sell 序号",action:()=>{const rm=game.rooms[game.current_room_id];if(!rm.npc_id||!game.npcs[rm.npc_id]){exec(()=>"没有商人。","sell");return}const npc=game.npcs[rm.npc_id];if(npc.npc_type!=="MERCHANT"){exec(()=>"不是商人。","sell");return}const ik=Object.keys(game.inventory);const s=ik.filter(i=>{const it=game.items[i];return it&&(npc.buys_types||[]).includes(it.type)});if(!s.length){exec(()=>"没有可卖的。","sell");return}showTargets("出售：",[...s.map(iid=>{const idx=ik.indexOf(iid)+1;const it=game.items[iid];const p=Math.max(2,Math.floor((it.value||0)/2));return{text:`(${idx}) ${it.name} → ${p}💰`,action:()=>exec(()=>game.doSell([String(idx)]),`sell ${idx}`)}}),{text:"取消",hint:"esc",cls:"bc",action:clearTargets}])}},{text:"💚 治疗",hint:"heal",action:()=>exec(()=>game.doHeal(),"heal")}]);
  addGroup("战斗",[{text:"⚔️ 攻击",hint:"attack",cls:"br",action:()=>exec(()=>game.doAttack(),"attack")},{text:"🏃 逃跑",hint:"flee",cls:"by",action:()=>exec(()=>game.doFlee(),"flee")}]);
  addGroup("队友",[{text:"🤝 招募",hint:"recruit",action:()=>exec(()=>game.doRecruit(),"recruit")},{text:"👥 队伍",hint:"party",action:()=>exec(()=>game.doParty(),"party")}]);
}
function init(){cmds.innerHTML="";game=new Game();buildCommands();initMapUi();log("迷雾笼罩着古老的森林。你从古树下醒来——\n什么都不记得了。远处的高塔在迷雾中若隐若现……\n\n💡 点击按钮或输入指令后按回车开始冒险！");upd()}
async function loadExternalData(){
  async function getJson(path){const r=await fetch(path);if(!r.ok)throw new Error(path);return r.json()}
  try{
    const rooms=await getJson("data/rooms.json");
    const items=await getJson("data/items.json");
    const monsters=await getJson("data/monsters.json");
    const npcs=await getJson("data/npcs.json");
    const companions=await getJson("data/companions.json");
    const live={items:{},monsters:{},npcs:{},companions:{},rooms:{}};
    for(const d of items){const p={};if(d.emoji)p.emoji=d.emoji;if(d.use_msg)p.use_msg=d.use_msg;if(Object.keys(p).length)live.items[d.id]=p}
    for(const d of monsters){if(d.emoji)live.monsters[d.id]={emoji:d.emoji}}
    for(const d of npcs){if(d.emoji)live.npcs[d.id]={emoji:d.emoji}}
    for(const d of companions){if(d.emoji)live.companions[d.id]={emoji:d.emoji}}
    for(const d of rooms){const p={};if(d.emoji)p.emoji=d.emoji;if(d.map)p.map=d.map;if(Object.keys(p).length)live.rooms[d.id]=p}
    applyDataEnrich(live);
    return true;
  }catch(e){return false}
}
async function boot(){applyDataEnrich();await loadExternalData();init()}

// ── 文本输入处理 ──
const inputBox=document.getElementById("input-box");
const inputBtn=document.getElementById("input-btn");

const COMMANDS={
  look:{type:"探索",func:(g,a)=>g.doLook(),hint:"look / l"},
  l:{type:"",func:(g,a)=>g.doLook(),hint:""},
  north:{type:"移动",func:(g,a)=>g.doGo("north"),hint:"north / n"},
  n:{type:"",func:(g,a)=>g.doGo("north"),hint:""},
  south:{type:"移动",func:(g,a)=>g.doGo("south"),hint:"south / s"},
  s:{type:"",func:(g,a)=>g.doGo("south"),hint:""},
  east:{type:"移动",func:(g,a)=>g.doGo("east"),hint:"east / e"},
  e:{type:"",func:(g,a)=>g.doGo("east"),hint:""},
  west:{type:"移动",func:(g,a)=>g.doGo("west"),hint:"west / w"},
  w:{type:"",func:(g,a)=>g.doGo("west"),hint:""},
  up:{type:"移动",func:(g,a)=>g.doGo("up"),hint:"up / u"},
  u:{type:"",func:(g,a)=>g.doGo("up"),hint:""},
  down:{type:"移动",func:(g,a)=>g.doGo("down"),hint:"down / d"},
  d:{type:"",func:(g,a)=>g.doGo("down"),hint:""},
  take:{type:"物品",func:(g,a)=>{if(a.length){const s=a.join(" ");return g.doTake(s==="all"?["all"]:a)}return"拿什么？"},hint:"take"},
  get:{type:"",func:(g,a)=>{if(a.length){const s=a.join(" ");return g.doTake(s==="all"?["all"]:a)}return"拿什么？"},hint:""},
  drop:{type:"物品",func:(g,a)=>a.length?g.doDrop(a):"丢什么？",hint:"drop"},
  use:{type:"物品",func:(g,a)=>a.length?g.doUse(a):"用什么？",hint:"use"},
  inventory:{type:"物品",func:(g,a)=>g.doInventory(),hint:"inv / i"},
  i:{type:"",func:(g,a)=>g.doInventory(),hint:""},
  attack:{type:"战斗",func:(g,a)=>g.doAttack(),hint:"attack"},
  flee:{type:"战斗",func:(g,a)=>g.doFlee(),hint:"flee"},
  talk:{type:"社交",func:(g,a)=>g.doTalk(),hint:"talk"},
  say:{type:"",func:(g,a)=>g.doTalk(),hint:""},
  trade:{type:"社交",func:(g,a)=>g.doTrade(),hint:"trade"},
  buy:{type:"社交",func:(g,a)=>a.length?g.doBuy(a):"买什么？",hint:"buy"},
  sell:{type:"社交",func:(g,a)=>a.length?g.doSell(a):"卖什么？",hint:"sell"},
  heal:{type:"社交",func:(g,a)=>g.doHeal(),hint:"heal"},
  recruit:{type:"队友",func:(g,a)=>g.doRecruit(),hint:"recruit"},
  party:{type:"队友",func:(g,a)=>g.doParty(),hint:"party"},
  companions:{type:"",func:(g,a)=>g.doParty(),hint:""},
  help:{type:"系统",func:(g,a)=>g.doHelp(),hint:"help / h"},
  h:{type:"",func:(g,a)=>g.doHelp(),hint:""},
  score:{type:"系统",func:(g,a)=>g.doScore(),hint:"score"},
  status:{type:"",func:(g,a)=>g.doScore(),hint:""},
  map:{type:"系统",func:(g,a)=>toggleMap(),hint:"map / m"},
  m:{type:"",func:(g,a)=>toggleMap(),hint:""},
};

function processTextInput(raw){
  const t=raw.trim().toLowerCase();
  if(!t)return;
  clearTargets();
  const parts=t.split(/\s+/);
  const cmd=parts[0];
  const args=parts.slice(1);

  // 1) 精确匹配
  if(cmd in COMMANDS){
    const entry=COMMANDS[cmd];
    exec(()=>entry.func(game,args),cmd);
    return;
  }

  // 2) 前缀匹配：att→attack, inv→inventory, figh→fight(未定义则不匹配)
  const matched=Object.keys(COMMANDS).filter(k=>k.startsWith(cmd));
  if(matched.length===1){
    // 只匹配唯一结果
    const entry=COMMANDS[matched[0]];
    exec(()=>entry.func(game,args),cmd);
    return;
  }
  if(matched.length>1){
    log(`「${cmd}」匹配到多个指令：${matched.join(", ")}，请输准确些。`);
    return;
  }

  log(`未知指令：${cmd}。输入 help 查看帮助。`);
}

// 回车提交
inputBox.addEventListener("keydown",e=>{if(e.key==="Enter"){processTextInput(inputBox.value);inputBox.value="";inputBox.focus()}});
// 点击按钮提交
inputBtn.addEventListener("click",()=>{processTextInput(inputBox.value);inputBox.value="";inputBox.focus()});
// 点击故事区自动聚焦输入框
document.getElementById("story").addEventListener("click",()=>inputBox.focus());

boot();
</script>
